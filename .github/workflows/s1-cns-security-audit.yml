name: "SentinelOne Security Audit"

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [master, main, develop, release]

# Garante que apenas um scan rode por vez para evitar concorrência no console
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  s1_cns_audit:
    name: "S1 Security Scan (Audit Mode)"
    runs-on: ubuntu-latest
    container:
      image: pingsafe/s1-shift-left-cli:0.5.6
      options: --entrypoint ""

    steps:
      - name: "1.0 - Repository Checkout"
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: "2.0 - Environment Configuration"
        run: |
          echo "::group::Configuring SentinelOne CLI"
          s1-cns-cli config \
            --service-user-api-token ${{ secrets.S1_SERVICE_USER_API_TOKEN }} \
            --management-console-url https://usea1-016.sentinelone.net \
            --scope-type SITE \
            --scope-id 1513300546865075167 \
            --tag ${{ secrets.S1_TAG }}
          
          git config --global --add safe.directory $PWD
          echo "::endgroup::"

      - name: "3.0 - Secret Leak Detection"
        id: secret_scan
        continue-on-error: true
        env:
          DEST: ${{ github.event.pull_request.base.sha }}
          SRC: ${{ github.event.pull_request.head.ref }}
          REPO_FULL_NAME: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}
        run: |
          echo "::group::Scanning for AWS Keys, Tokens and Passwords"
          s1-cns-cli scan secret \
            -d $PWD \
            --pull-request origin/$SRC $DEST \
            --publish-result \
            --repo-full-name $REPO_FULL_NAME \
            --repo-url $REPO_URL/$REPO_FULL_NAME \
            --provider GITHUB
          echo "::endgroup::"

      - name: "4.0 - Infrastructure & Container Audit (IaC)"
        id: iac_scan
        continue-on-error: true
        env:
          REPO_FULL_NAME: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "::group::Scanning CloudFormation, Dockerfiles and Kubernetes Manifests"
          s1-cns-cli scan iac \
            -d $PWD \
            --publish-result \
            --repo-full-name $REPO_FULL_NAME \
            --repo-url $REPO_URL/$REPO_FULL_NAME \
            --branch $BRANCH \
            --provider GITHUB
          echo "::endgroup::"

      - name: "5.0 - Software Composition Analysis (SCA)"
        id: sca_scan
        continue-on-error: true
        run: |
          echo "::group::Scanning Dependencies and Third-Party Libraries"
          s1-cns-cli scan vuln -d $PWD
          echo "::endgroup::"

      - name: "6.0 - Audit Summary"
        if: always()
        run: |
          echo "### 🛡️ SentinelOne Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "A análise de segurança foi concluída com sucesso." >> $GITHUB_STEP_SUMMARY
          echo "- **Secret Scan:** ${{ steps.secret_scan.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **IaC Scan:** ${{ steps.iac_scan.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SCA Scan:** ${{ steps.sca_scan.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
          echo "> Este workflow está operando em **MODO AUDITORIA**. Nenhuma esteira foi bloqueada. Resultados detalhados disponíveis no Console Central." >> $GITHUB_STEP_SUMMARY
